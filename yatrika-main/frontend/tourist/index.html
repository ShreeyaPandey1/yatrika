<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Yatrika - Tourist Safety App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'/>
    <script src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        :root {
            --teal: #2dd4bf;
            --teal-dark: #0d9488;
            --teal-dim: rgba(45,212,191,0.12);
            --red: #f43f5e;
            --surface: #111827;
            --surface2: #1f2937;
            --surface3: #374151;
            --border: rgba(255,255,255,0.08);
            --text: #f9fafb;
            --muted: #9ca3af;
            --radius: 16px;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--surface);
            color: var(--text);
            margin: 0;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
        }
        #app-container {
            max-width: 430px;
            margin: 0 auto;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            background: var(--surface);
        }
        .page { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 0; display: flex; flex-direction: column; }
        .has-nav { padding-bottom: 88px !important; }
        .page::-webkit-scrollbar { display: none; }

        /* Bottom Nav */
        #bottom-nav {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: var(--surface2);
            border-top: 1px solid var(--border);
            display: flex;
            padding: 8px 0 max(8px, env(safe-area-inset-bottom));
            z-index: 100;
        }
        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 6px 0;
            background: none;
            border: none;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            cursor: pointer;
            transition: color 0.2s;
            position: relative;
        }
        .nav-btn.active { color: var(--teal); }
        .nav-btn .nav-icon { width: 22px; height: 22px; transition: transform 0.2s; }
        .nav-btn.active .nav-icon { transform: scale(1.1); }
        .nav-panic {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-top: -20px;
            box-shadow: 0 0 0 4px var(--surface2), 0 8px 24px rgba(244,63,94,0.4);
            transition: transform 0.15s, box-shadow 0.15s;
            flex-shrink: 0;
        }
        .nav-panic:active { transform: scale(0.93); }

        /* Cards */
        .card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
        }
        .card-sm { padding: 12px 14px; }

        /* Inputs */
        .input-wrap { position: relative; margin-bottom: 14px; }
        .input-wrap .icon-left {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--muted); pointer-events: none; width: 18px; height: 18px;
        }
        input, select, textarea {
            width: 100%;
            background: var(--surface3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            padding: 13px 14px 13px 44px;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }
        input:focus, select:focus { border-color: var(--teal); }
        input::placeholder { color: var(--muted); }
        select option { background: var(--surface2); }
        .input-right {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--muted); cursor: pointer;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: linear-gradient(135deg, var(--teal), var(--teal-dark)); color: #0f2b26; }
        .btn-danger { background: linear-gradient(135deg, #f43f5e, #e11d48); color: white; }
        .btn-ghost { background: var(--surface3); color: var(--text); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-sm { padding: 10px 14px; font-size: 13px; width: auto; }

        /* Map */
        #map {
            width: 100%; height: 200px;
            border-radius: var(--radius);
            overflow: hidden;
            position: relative;
            z-index: 1;
        }
        #map.fullscreen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100dvh;
            border-radius: 0;
            z-index: 9999;
        }
        .map-expand-btn {
            position: absolute;
            top: 10px; right: 10px;
            z-index: 500;
            background: rgba(17,24,39,0.85);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            padding: 6px 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Toast */
        #toast-container {
            position: fixed;
            bottom: 90px; left: 50%;
            transform: translateX(-50%);
            z-index: 9998;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            pointer-events: none;
            width: 90%;
            max-width: 380px;
        }
        .toast {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            pointer-events: auto;
            width: 100%;
        }
        .toast.success { border-color: rgba(45,212,191,0.3); }
        .toast.error { border-color: rgba(244,63,94,0.3); }
        .toast.warn { border-color: rgba(251,191,36,0.3); }
        @keyframes toastIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        @keyframes toastOut { from { opacity:1; } to { opacity:0; pointer-events:none; } }

        /* Modal */
        .modal-backdrop {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        .modal {
            background: var(--surface2);
            border-radius: 24px 24px 0 0;
            padding: 24px;
            width: 100%;
            max-width: 430px;
            border-top: 1px solid var(--border);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-handle {
            width: 40px; height: 4px;
            background: var(--surface3);
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        /* Pill badge */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-teal { background: var(--teal-dim); color: var(--teal); }
        .badge-red { background: rgba(244,63,94,0.12); color: #fb7185; }
        .badge-amber { background: rgba(251,191,36,0.12); color: #fbbf24; }

        /* Alert bar */
        .alert-bar {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 12px;
            border-left: 3px solid;
        }
        .alert-warn { background: rgba(251,191,36,0.08); border-color: #fbbf24; }
        .alert-info { background: var(--teal-dim); border-color: var(--teal); }
        .alert-danger { background: rgba(244,63,94,0.08); border-color: #f43f5e; }

        /* Header */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 16px 0;
            position: sticky;
            top: 0;
            background: var(--surface);
            z-index: 10;
            padding-top: max(16px, env(safe-area-inset-top));
        }

        /* Safety score ring */
        .score-ring {
            width: 56px; height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            border: 3px solid;
            flex-shrink: 0;
        }
        .score-high { border-color: #2dd4bf; color: #2dd4bf; background: rgba(45,212,191,0.08); }
        .score-mid { border-color: #fbbf24; color: #fbbf24; background: rgba(251,191,36,0.08); }
        .score-low { border-color: #f43f5e; color: #f43f5e; background: rgba(244,63,94,0.08); }

        /* Divider */
        .divider { height: 1px; background: var(--border); margin: 16px 0; }

        /* Emergency grid */
        .emer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .emer-btn {
            background: var(--surface3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .emer-btn:active { background: var(--surface); }
        .emer-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        /* Destination block */
        .dest-block {
            background: var(--surface3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
        }
        .dest-block input {
            background: var(--surface2);
            padding: 10px 12px;
        }
        .place-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .place-row input { padding-left: 12px; }

        /* Itinerary card */
        .draft-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 10px;
            transition: border-color 0.2s;
        }
        .draft-card:active { border-color: var(--teal); }

        /* Splash */
        .splash-bg {
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at 60% 20%, rgba(45,212,191,0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 20% 80%, rgba(99,102,241,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Label */
        label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }

        /* Section title */
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
        }

        /* Spinner */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { animation: spin 0.8s linear infinite; }

        /* Pulse dot */
        .pulse-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--teal);
            animation: pulseDot 2s ease-in-out infinite;
        }
        @keyframes pulseDot {
            0%, 100% { box-shadow: 0 0 0 0 rgba(45,212,191,0.4); }
            50% { box-shadow: 0 0 0 6px rgba(45,212,191,0); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 0; }

        /* leaflet fix */
        .leaflet-container { font-family: 'DM Sans', sans-serif; background: var(--surface3); }
    </style>
</head>
<body>
<div id="app-container">
    <div id="page-root" class="page"></div>
    <div id="bottom-nav" style="display:none;"></div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- QR Modal -->
<div id="qr-modal" style="display:none;" class="modal-backdrop">
    <div class="modal">
        <div class="modal-handle"></div>
        <div style="text-align:center; margin-bottom:20px;">
            <div style="font-size:20px; font-weight:700; margin-bottom:6px;" id="qr-title">Journey Activated!</div>
            <div style="font-size:14px; color:var(--muted);" id="qr-subtitle">Show this QR code to authorities for verification</div>
        </div>
        <div style="background:white; border-radius:12px; padding:16px; display:inline-block; width:100%; display:flex; justify-content:center; margin-bottom:16px;">
            <canvas id="qr-canvas"></canvas>
        </div>
        <div id="qr-tx" style="font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); word-break:break-all; margin-bottom:16px; text-align:center;"></div>
        <button class="btn btn-ghost" onclick="hideModal('qr-modal')">Close</button>
    </div>
</div>

<!-- Emergency Modal -->
<div id="emergency-modal" style="display:none;" class="modal-backdrop">
    <div class="modal">
        <div class="modal-handle"></div>
        <div style="text-align:center; margin-bottom:20px;">
            <div style="width:56px;height:56px;background:rgba(244,63,94,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
                <i data-lucide="phone-call" style="width:24px;height:24px;color:#f43f5e;"></i>
            </div>
            <div style="font-size:18px;font-weight:700;color:#f43f5e;margin-bottom:4px;">EMERGENCY ACTIVATED</div>
            <div style="font-size:13px;color:var(--muted);">Authorities and contacts notified</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">
            <a href="tel:112" class="btn btn-danger" style="text-decoration:none;">
                <i data-lucide="phone" style="width:18px;height:18px;"></i> Call Emergency (112)
            </a>
            <a href="tel:100" class="btn" style="background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid rgba(59,130,246,0.3);text-decoration:none;padding:14px;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:600;">
                <i data-lucide="shield" style="width:18px;height:18px;"></i> Call Police (100)
            </a>
        </div>
        <button class="btn btn-ghost" onclick="hideModal('emergency-modal')">Close</button>
    </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const API_URL = window.location.hostname === 'localhost'
    ? 'http://localhost:5000/api'
    : 'https://yatrika-ai.onrender.com/api';

// ─── STATE ────────────────────────────────────────────────────────────────────
const state = {
    page: 'splash',
    lang: 'en',
    user: null,
    profile: null,
    drafts: [],
    activeJourney: null,
    activeJourneyData: null,
};

// ─── TRANSLATIONS ─────────────────────────────────────────────────────────────
const T = {
    en: { appName:'Yatrika', tagline:'Your Safety, Our Priority', home:'Home', plan:'Plan', active:'Active', account:'Account',
          login:'Sign In', signup:'Sign Up', phone:'Phone Number', password:'Password', fullName:'Full Name', email:'Email',
          confirmPassword:'Confirm Password', age:'Age', emergency:'Emergency Contact', role:'I am a',
          createAccount:'Create Account', alreadyHaveAccount:'Already have an account?', signInHere:'Sign in',
          myTripDrafts:'My Trips', createNewTrip:'New Trip', safetyScore:'Safety', startJourney:'Start Journey',
          endJourney:'End Journey', activeJourney:'Active Journey', nextStop:'Next Stop', selectDraft:'Select Itinerary',
          from:'From', to:'To', selectMembers:'Select Members', activateTrip:'Activate Trip',
          showQrCode:'Show QR Code', journeyActivation:'Journey Activation', back:'Back', notifications:'Alerts',
          profileDetails:'Profile', familyMembers:'Family', addMember:'Add Member', settings:'Settings', logout:'Log Out' },
    hi: { appName:'यात्रिका', tagline:'आपकी सुरक्षा, हमारी प्राथमिकता', home:'होम', plan:'योजना', active:'यात्रा', account:'खाता',
          login:'साइन इन', signup:'साइन अप', phone:'फ़ोन नंबर', password:'पासवर्ड', fullName:'पूरा नाम', email:'ईमेल',
          confirmPassword:'पासवर्ड दोबारा', age:'उम्र', emergency:'आपातकालीन संपर्क', role:'मैं हूँ',
          createAccount:'खाता बनाएं', alreadyHaveAccount:'पहले से खाता है?', signInHere:'साइन इन करें',
          myTripDrafts:'मेरी यात्राएं', createNewTrip:'नई यात्रा', safetyScore:'सुरक्षा', startJourney:'यात्रा शुरू करें',
          endJourney:'यात्रा समाप्त करें', activeJourney:'सक्रिय यात्रा', nextStop:'अगला पड़ाव', selectDraft:'ड्राफ्ट चुनें',
          from:'से', to:'तक', selectMembers:'सदस्य चुनें', activateTrip:'यात्रा सक्रिय करें',
          showQrCode:'QR कोड दिखाएं', journeyActivation:'यात्रा सक्रियण', back:'वापस', notifications:'सूचनाएं',
          profileDetails:'प्रोफाइल', familyMembers:'परिवार', addMember:'सदस्य जोड़ें', settings:'सेटिंग्स', logout:'लॉग आउट' },
    bn: { appName:'যাত্রিকা', tagline:'আপনার সুরক্ষা, আমাদের অগ্রাধিকার', home:'হোম', plan:'পরিকল্পনা', active:'যাত্রা', account:'অ্যাকাউন্ট',
          login:'সাইন ইন', signup:'সাইন আপ', phone:'ফোন নম্বর', password:'পাসওয়ার্ড', fullName:'পুরো নাম', email:'ইমেইল',
          confirmPassword:'পাসওয়ার্ড নিশ্চিত', age:'বয়স', emergency:'জরুরি যোগাযোগ', role:'আমি',
          createAccount:'অ্যাকাউন্ট তৈরি', alreadyHaveAccount:'ইতিমধ্যে অ্যাকাউন্ট আছে?', signInHere:'সাইন ইন করুন',
          myTripDrafts:'আমার ট্রিপ', createNewTrip:'নতুন ট্রিপ', safetyScore:'নিরাপত্তা', startJourney:'যাত্রা শুরু',
          endJourney:'যাত্রা শেষ', activeJourney:'সক্রিয় যাত্রা', nextStop:'পরবর্তী স্টপ', selectDraft:'ড্রাফট নির্বাচন',
          from:'থেকে', to:'পর্যন্ত', selectMembers:'সদস্য নির্বাচন', activateTrip:'ট্রিপ সক্রিয় করুন',
          showQrCode:'QR কোড দেখান', journeyActivation:'যাত্রা সক্রিয়করণ', back:'ফিরে', notifications:'বিজ্ঞপ্তি',
          profileDetails:'প্রোফাইল', familyMembers:'পরিবার', addMember:'সদস্য যোগ', settings:'সেটিংস', logout:'লগ আউট' },
};
const t = () => T[state.lang] || T.en;

// ─── DOM HELPERS ──────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const root = () => $('page-root');

function showModal(id) { $(id).style.display = 'flex'; lucide.createIcons(); }
function hideModal(id) { $(id).style.display = 'none'; }

let toastTimer;
function toast(msg, type = 'info', duration = 3000) {
    const icons = { success: 'check-circle', error: 'x-circle', warn: 'alert-triangle', info: 'info' };
    const colors = { success: '#2dd4bf', error: '#f43f5e', warn: '#fbbf24', info: '#60a5fa' };
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<i data-lucide="${icons[type]}" style="width:18px;height:18px;color:${colors[type]};flex-shrink:0;"></i><span>${msg}</span>`;
    $('toast-container').appendChild(el);
    lucide.createIcons();
    setTimeout(() => { el.remove(); }, duration);
}

// ─── API ──────────────────────────────────────────────────────────────────────
async function api(endpoint, method = 'GET', body = null) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    const token = state.user?.token || sessionStorage.getItem('yatrika-token');
    if (token) opts.headers['Authorization'] = `Bearer ${token}`;
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API_URL + endpoint, opts);
    if (!res.ok) { const e = await res.text(); throw new Error(e || `HTTP ${res.status}`); }
    const text = await res.text();
    return text ? JSON.parse(text) : {};
}

// ─── MAP ──────────────────────────────────────────────────────────────────────
let leafMap = null;
let userMarker = null;
let mapExpanded = false;

function destroyMap() {
    if (leafMap) { leafMap.remove(); leafMap = null; userMarker = null; }
}

function initMap(containerId = 'map') {
    destroyMap();
    const el = $(containerId);
    if (!el) return;
    try {
        leafMap = L.map(containerId, { zoomControl: false }).setView([22.5726, 88.3639], 12);

const ZONE_STYLES = {
    high:   { color:'#f43f5e', fillColor:'#f43f5e', fillOpacity:0.18, weight:2, dashArray:'6,4' },
    medium: { color:'#fb923c', fillColor:'#fb923c', fillOpacity:0.14, weight:1.5, dashArray:'5,5' },
    low:    { color:'#fbbf24', fillColor:'#fbbf24', fillOpacity:0.10, weight:1,   dashArray:'4,6' },
};

const ZONE_ICONS = { high:'🔴', medium:'🟠', low:'🟡' };
const ZONE_LABELS = { high:'High Risk', medium:'Moderate Risk', low:'Low Risk' };

function addGeofence() {
    if (!leafMap) return;
    DANGER_ZONES.forEach(zone => {
        const style = ZONE_STYLES[zone.severity];
        const circle = L.circle([zone.lat, zone.lng], {
            ...style,
            radius: zone.radius,
            interactive: true,
        }).addTo(leafMap);

        circle.bindPopup(`
            <div style="font-family:'DM Sans',sans-serif;min-width:200px;">
                <div style="font-size:14px;font-weight:700;margin-bottom:4px;">
                    ${ZONE_ICONS[zone.severity]} ${zone.name}
                </div>
                <div style="display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;margin-bottom:6px;
                    background:${zone.severity==='high'?'rgba(244,63,94,0.15)':zone.severity==='medium'?'rgba(251,146,60,0.15)':'rgba(251,191,36,0.15)'};
                    color:${zone.severity==='high'?'#f43f5e':zone.severity==='medium'?'#fb923c':'#d97706'};">
                    ${ZONE_LABELS[zone.severity]}
                </div>
                <div style="font-size:12px;color:#555;line-height:1.5;">${zone.reason}</div>
                <div style="font-size:11px;color:#888;margin-top:6px;">Radius: ${zone.radius >= 1000 ? (zone.radius/1000).toFixed(1)+'km' : zone.radius+'m'}</div>
            </div>
        `, { maxWidth: 240 });

        // pulse animation for high-risk zones via a second transparent circle
        if (zone.severity === 'high') {
            L.circle([zone.lat, zone.lng], {
                color: '#f43f5e', fillColor: 'transparent',
                fillOpacity: 0, weight: 1.5, opacity: 0.4,
                radius: zone.radius * 1.3, dashArray: '3,8', interactive: false,
            }).addTo(leafMap);
        }
    });
}

function locateUser() {
    if (!navigator.geolocation || !leafMap) return;
    navigator.geolocation.getCurrentPosition(pos => {
        const { latitude: lat, longitude: lng } = pos.coords;
        leafMap.setView([lat, lng], 15);
        if (userMarker) leafMap.removeLayer(userMarker);
        userMarker = L.marker([lat, lng]).bindPopup('<b>You are here</b>').addTo(leafMap);
    }, () => {});
}

function toggleMapFullscreen() {
    const el = $('map');
    if (!el) return;
    mapExpanded = !mapExpanded;
    el.classList.toggle('fullscreen', mapExpanded);
    const btn = $('map-expand-btn');
    if (btn) btn.innerHTML = mapExpanded
        ? '<i data-lucide="minimize-2" style="width:16px;height:16px;"></i>'
        : '<i data-lucide="maximize-2" style="width:16px;height:16px;"></i>';
    setTimeout(() => leafMap && leafMap.invalidateSize(), 300);
    lucide.createIcons();
}

// Geofence watcher — checks all hardcoded zones
const insideZones = new Set();
function haversineM(lat1, lng1, lat2, lng2) {
    const R = 6371000, toRad = d => d * Math.PI / 180;
    const dLat = toRad(lat2-lat1), dLng = toRad(lng2-lng1);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
if (navigator.geolocation) {
    navigator.geolocation.watchPosition(pos => {
        const { latitude: lat, longitude: lng } = pos.coords;
        DANGER_ZONES.forEach((zone, i) => {
            const dist = haversineM(lat, lng, zone.lat, zone.lng);
            const inside = dist <= zone.radius;
            if (inside && !insideZones.has(i)) {
                insideZones.add(i);
                const msg = zone.severity === 'high'
                    ? '🔴 HIGH RISK: You entered "' + zone.name + '". ' + zone.reason
                    : zone.severity === 'medium'
                    ? '🟠 Caution: Entering "' + zone.name + '". ' + zone.reason
                    : '🟡 Note: Near "' + zone.name + '". ' + zone.reason;
                toast(msg, zone.severity === 'high' ? 'error' : zone.severity === 'medium' ? 'warn' : 'info', 7000);
                if (leafMap) leafMap.setView([lat, lng], 15);
            } else if (!inside) {
                insideZones.delete(i);
            }
        });
    }, () => {}, { enableHighAccuracy: true });
}

    if (v('reg-pw') !== v('reg-pw2')) { toast('Passwords do not match', 'error'); return; }
    if (v('reg-pw').length < 6) { toast('Password too short (min 6)', 'warn'); return; }
    const btn = $('reg-btn');
    btn.disabled = true;
    btn.innerHTML = '<i data-lucide="loader-2" class="spin" style="width:18px;height:18px;"></i> Creating...';
    lucide.createIcons();
    try {
        const data = await api('/auth/register', 'POST', {
            fullName: v('reg-name'), email: v('reg-email'), phone: v('reg-phone'),
            age: parseInt(v('reg-age')) || undefined, emergencyContact: v('reg-emergency'),
            password: v('reg-pw')
        });
        state.user = data.user || data;
        state.profile = data.profile || null;
        if (data.token) sessionStorage.setItem('yatrika-token', data.token);
        toast('Account created! Welcome 🎉', 'success');
        await initApp();

async function saveDraft() {
    const name = $('trip-name').value.trim();
    const startingCity = $('trip-start').value.trim();
    if (!name || !startingCity) { toast('Please fill trip name and starting city', 'warn'); return; }
    const dests = [...document.querySelectorAll('#dest-container > .dest-block')].map(block => {
        const city = block.querySelector('.dest-city').value.trim();
        const places = [...block.querySelectorAll('.place-row')].map(r => ({
            name: r.querySelector('.place-name').value.trim(),
            notes: r.querySelector('.place-note').value.trim()
        })).filter(p => p.name);
        return { city, places };
    }).filter(d => d.city);
    const draft = { _id: 'draft_'+Date.now(), name, startingCity, destinations: dests };
    const btn = $('save-btn');
    btn.disabled = true;
    btn.innerHTML = '<i data-lucide="loader-2" class="spin" style="width:18px;height:18px;"></i> Saving...';
    lucide.createIcons();
    try {
        await api('/itineraries', 'POST', draft);
    } catch(e) {
        const local = JSON.parse(sessionStorage.getItem('yatrika-drafts') || '[]');
        local.push(draft);
        sessionStorage.setItem('yatrika-drafts', JSON.stringify(local));
    }
    toast('Trip saved!', 'success');
    go('plan');
}

async function handleActivate() {
    const draftId = $('draft-sel').value;
    const startDate = $('start-date').value;
    const endDate = $('end-date').value;
    if (!draftId||!startDate||!endDate) { toast('Please fill all fields','warn'); return; }
    const btn = $('activate-btn');
    btn.disabled = true;
    btn.innerHTML = '<i data-lucide="loader-2" class="spin" style="width:18px;height:18px;"></i> Activating...';
    lucide.createIcons();
    const demoToken = 'demo_' + Date.now();
    state.activeJourney = { _id: 'pending', itinerary: { destinations: [] } };
    state.activeJourneyData = { qrCodeToken: demoToken, txHash: null };
    toast('Journey activated! 🎉','success');
    showQR();
    api('/journeys/start','POST',{draftId,startDate,endDate,memberIds:[]}).then(data => {
        state.activeJourney = data;
        state.activeJourneyData = { qrCodeToken: data.qrCodeToken, txHash: data.blockchainTxHashes?.start };
    }).catch(console.error);
}

function showQR() {
    if (!state.activeJourneyData) { toast('No active journey data','warn'); return; }
    $('qr-tx').textContent = state.activeJourneyData.txHash || '';
    new QRious({ element: $('qr-canvas'), value: `${location.origin}/verify?token=${state.activeJourneyData.qrCodeToken}`, size: 200, padding: 10 });
    showModal('qr-modal');
}

async function doCheckIn() {
    if (!state.activeJourney) { toast('No active journey','warn'); return; }
    try {

    } catch(e) { toast("Check-in failed",'error'); }
}

async function handleEndJourney() {
    if (!state.activeJourney) return;

    try {
        await api(`/journeys/${state.activeJourney._id}/end`,'POST');
        state.activeJourney = null; state.activeJourneyData = null;
        toast('Journey ended. Stay safe!','success');
        go('home');

}

            <div style="font-size:13px;font-weight:500;margin-bottom:8px;">Add Member</div>
            <div style="display:flex;gap:8px;margin-bottom:8px;">
                <input id="mem-name" type="text" placeholder="Full name" style="padding-left:12px;">
                <input id="mem-age" type="number" placeholder="Age" style="padding-left:12px;max-width:80px;">
            </div>
            <button class="btn btn-ghost btn-sm" onclick="addMember()" style="width:100%;">
                <i data-lucide="user-plus" style="width:16px;height:16px;"></i> Add
            </button>
        </div>

        <!-- Danger zone -->
        <div class="card" style="border-color:rgba(244,63,94,0.2);">
            <div style="font-size:15px;font-weight:600;margin-bottom:12px;">Session</div>
            <div style="display:flex;flex-direction:column;gap:8px;">
                <button class="btn btn-danger" onclick="handleLogout()">
                    <i data-lucide="log-out" style="width:18px;height:18px;"></i> ${t().logout}
                </button>
                <button class="btn btn-ghost" onclick="clearData()">
                    <i data-lucide="trash-2" style="width:18px;height:18px;"></i> Clear Local Data
                </button>
            </div>
        </div>
    </div>`;
};

async function addMember() {
    const name = $('mem-name')?.value?.trim();
    const age = $('mem-age')?.value;
    if (!name||!age) { toast('Enter name and age','warn'); return; }
    try {
        await api('/profile/members','POST',{fullName:name,age:parseInt(age)});
        const p = await api('/profile/me');
        state.profile = p;
        toast('Member added','success');
        pages.account();
    } catch(e) { toast('Failed to add member','error'); }
}

async function removeMember(id) {
    try {
        await api(`/profile/members/${id}`,'DELETE');
        state.profile.familyMembers = state.profile.familyMembers.filter(m=>m._id!==id);
        pages.account();
        toast('Removed','success');
    } catch(e) { toast('Failed to remove','error'); }
}

function handleLogout() {
    if (!confirm('Log out?')) return;
    sessionStorage.clear();
    state.user = null; state.profile = null; state.activeJourney = null;
    if (leafMap) destroyMap();
    toast('Logged out','success');
    go('auth');
}

function clearData() {
    sessionStorage.clear();
    toast('Local data cleared','success');
    location.reload();
}

// ─── PANIC ────────────────────────────────────────────────────────────────────
async function handlePanic() {
    if (!confirm('🚨 EMERGENCY ALERT\n\nThis will notify authorities and your emergency contacts. Proceed?')) return;
    try {
        let loc = null;
        if (navigator.geolocation) {
            await new Promise(r => navigator.geolocation.getCurrentPosition(p => {
                loc = { lat: p.coords.latitude, lng: p.coords.longitude };
                r();
            }, r, { timeout: 4000 }));
        }
        if (navigator.vibrate) navigator.vibrate([200,100,200,100,200]);
        try {
            const ep = state.activeJourney
                ? `/journeys/${state.activeJourney._id}/panic`
                : '/panic';
            await api(ep, 'POST', { location: loc, timestamp: new Date().toISOString() });
        } catch(e) {}
        showModal('emergency-modal');
        toast('🚨 Emergency alert sent!', 'error', 5000);
    } catch(e) {
        showModal('emergency-modal');
    }
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function togglePw(id, btn) {
    const el = $(id);
    const showing = el.type === 'text';
    el.type = showing ? 'password' : 'text';
    btn.querySelector('i').setAttribute('data-lucide', showing ? 'eye' : 'eye-off');
    lucide.createIcons();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function initApp() {
    try {
        const [prof, draftsRes] = await Promise.all([api('/profile/me'), api('/itineraries')]);
        state.profile = prof;
        state.drafts = draftsRes.drafts || draftsRes || [];
        try {
            const j = await api('/journeys/active');
            state.activeJourney = j?.journey || null;
            if (state.activeJourney) {
                state.activeJourneyData = {
                    qrCodeToken: state.activeJourney.qrCodeToken,
                    txHash: state.activeJourney.blockchainTxHashes?.start
                };
            }
        } catch(e) { state.activeJourney = null; }
        go('home');
    } catch(e) {
        sessionStorage.removeItem('yatrika-token');
        state.user = null;
        go('auth');
    }
}

function boot() {
    const savedLang = sessionStorage.getItem('yatrika-lang');
    if (savedLang) state.lang = savedLang;
    const token = sessionStorage.getItem('yatrika-token');
    if (token) {
        state.user = { token };
        initApp();
    } else {
        go('splash');
        setTimeout(() => go('lang'), 2200);
    }
}
boot();
